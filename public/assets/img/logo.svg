<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6e27a"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a67c00"/>
    </linearGradient>
  </defs>

  <!-- Head -->
  <rect x="78" y="30" width="100" height="80" rx="30" fill="white"/>
  <rect x="88" y="45" width="80" height="50" rx="20" fill="#0b0b0b"/>
  <!-- Eyes -->
  <rect x="102" y="62" width="18" height="18" rx="6" fill="url(#gold)"/>
  <rect x="136" y="62" width="18" height="18" rx="6" fill="url(#gold)"/>

  <!-- Neck -->
  <rect x="110" y="110" width="36" height="18" rx="6" fill="#1a1a1a"/>

  <!-- Torso -->
  <path d="M70 140 Q128 120 186 140 L186 210 Q128 235 70 210 Z" fill="white"/>
  <!-- Chest accent -->
  <path d="M110 170 L128 150 L146 170 L128 190 Z" fill="url(#gold)"/>

  <!-- Shoulder joints -->
  <circle cx="70"  cy="140" r="10" fill="url(#gold)"/>
  <circle cx="186" cy="140" r="10" fill="url(#gold)"/>

  <!-- ═══════════════════════════════════════════
       LEFT ARM — rotates outward (clockwise = left)
       Arm layout in local (pre-rotation) coords:
         Upper arm : y 140 → 185  (45px)
         Elbow     : cy 185
         Forearm   : y 185 → 218  (33px)
         Palm      : y 218 → 230
         Fingers   : y 194 → 218  (extend upward from palm)
       Pivot: (70, 140)
  ════════════════════════════════════════════════ -->
  <g transform="rotate(20 70 140)">
    <!-- Upper arm -->
    <rect x="55" y="140" width="30" height="45" rx="14" fill="white"/>
    <!-- Elbow joint -->
    <circle cx="70" cy="185" r="9" fill="url(#gold)"/>
    <!-- Forearm -->
    <rect x="55" y="185" width="30" height="33" rx="14" fill="white"/>
    <!-- Palm -->
    <rect x="52" y="214" width="36" height="20" rx="7" fill="white"/>
    <!-- Wrist connector -->
    <rect x="57" y="210" width="26" height="10" rx="4" fill="white"/>
    <!-- Fingers — gold so they contrast clearly against white palm, pointing down -->
    <rect x="54" y="230" width="9" height="18" rx="4.5" fill="url(#gold)"/>
    <rect x="65" y="230" width="9" height="22" rx="4.5" fill="url(#gold)"/>
    <rect x="76" y="230" width="9" height="18" rx="4.5" fill="url(#gold)"/>
    <!-- Thumb — angled outward from palm side -->
    <rect x="42" y="220" width="9" height="15" rx="4.5" fill="url(#gold)"
          transform="rotate(-30 46 220)"/>
  </g>

  <!-- ═══════════════════════════════════════════
       RIGHT ARM — rotates outward (counter-clockwise = right)
       Mirror of left arm.
       Pivot: (186, 140)
  ════════════════════════════════════════════════ -->
  <g transform="rotate(-20 186 140)">
    <!-- Upper arm -->
    <rect x="171" y="140" width="30" height="45" rx="14" fill="white"/>
    <!-- Elbow joint -->
    <circle cx="186" cy="185" r="9" fill="url(#gold)"/>
    <!-- Forearm -->
    <rect x="171" y="185" width="30" height="33" rx="14" fill="white"/>
    <!-- Palm -->
    <rect x="168" y="214" width="36" height="20" rx="7" fill="white"/>
    <!-- Wrist connector -->
    <rect x="173" y="210" width="26" height="10" rx="4" fill="white"/>
    <!-- Fingers — gold, pointing down -->
    <rect x="170" y="230" width="9" height="18" rx="4.5" fill="url(#gold)"/>
    <rect x="181" y="230" width="9" height="22" rx="4.5" fill="url(#gold)"/>
    <rect x="192" y="230" width="9" height="18" rx="4.5" fill="url(#gold)"/>
    <!-- Thumb — angled outward from palm side -->
    <rect x="200" y="220" width="9" height="15" rx="4.5" fill="url(#gold)"
          transform="rotate(30 204 220)"/>
  </g>

</svg>
