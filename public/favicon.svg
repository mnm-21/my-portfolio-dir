<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="8" y1="0" x2="56" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e3d3b7"/>
      <stop offset="100%" stop-color="#9a7d45"/>
    </linearGradient>
    <linearGradient id="g2" x1="8" y1="0" x2="56" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8b48a"/>
      <stop offset="100%" stop-color="#7a6035"/>
    </linearGradient>
    <linearGradient id="wrist-g" x1="20" y1="44" x2="44" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b89b62"/>
      <stop offset="100%" stop-color="#7a6035"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ===================== -->
  <!-- FOREARM / WRIST BASE  -->
  <!-- ===================== -->
  <!-- Forearm body -->
  <rect x="20" y="48" width="24" height="14" rx="5" fill="url(#wrist-g)" opacity="0.95"/>
  <!-- Forearm panel lines -->
  <line x1="26" y1="48" x2="26" y2="62" stroke="rgba(5,5,5,0.3)" stroke-width="0.9"/>
  <line x1="38" y1="48" x2="38" y2="62" stroke="rgba(5,5,5,0.3)" stroke-width="0.9"/>
  <!-- Forearm top highlight -->
  <rect x="20" y="48" width="24" height="2" rx="0" fill="rgba(244,241,234,0.16)"/>
  <!-- Wrist joint ring -->
  <rect x="18" y="44" width="28" height="6" rx="3" fill="url(#g1)" opacity="0.88"/>
  <rect x="18" y="44" width="28" height="2" rx="3" fill="rgba(244,241,234,0.2)"/>
  <!-- Wrist bolt dots -->
  <circle cx="22" cy="47" r="1.1" fill="rgba(5,5,5,0.5)"/>
  <circle cx="42" cy="47" r="1.1" fill="rgba(5,5,5,0.5)"/>

  <!-- ========= -->
  <!--   PALM    -->
  <!-- ========= -->
  <rect x="16" y="28" width="32" height="18" rx="5" fill="url(#g1)" opacity="0.93" filter="url(#softshadow)"/>
  <!-- Palm knuckle dividers -->
  <line x1="22.5" y1="28" x2="22.5" y2="33" stroke="rgba(5,5,5,0.35)" stroke-width="1"/>
  <line x1="29.5" y1="28" x2="29.5" y2="33" stroke="rgba(5,5,5,0.35)" stroke-width="1"/>
  <line x1="36.5" y1="28" x2="36.5" y2="33" stroke="rgba(5,5,5,0.35)" stroke-width="1"/>
  <!-- Palm top highlight -->
  <rect x="16" y="28" width="32" height="2.5" rx="0" fill="rgba(244,241,234,0.14)"/>

  <!-- ======================== -->
  <!-- CURLED RING FINGER       -->
  <!-- Bent forward, tip tucked -->
  <!-- ======================== -->
  <!-- Base phalanx (short, going up slightly then curling) -->
  <path d="M 34 28 L 34 22 Q 34 18 38 17 Q 42 16 42 20 L 42 24 Q 42 27 38 28 Z"
        fill="url(#g2)" opacity="0.88"/>
  <rect x="34" y="26" width="8" height="2.2" rx="1" fill="rgba(5,5,5,0.35)"/>

  <!-- ======================== -->
  <!-- CURLED PINKY             -->
  <!-- ======================== -->
  <path d="M 41 28 L 41 24 Q 41 20 44.5 19.5 Q 47.5 19 48 22 L 48 25 Q 48 28 44 28.5 Z"
        fill="url(#g2)" opacity="0.85"/>
  <rect x="41" y="26.5" width="7" height="1.8" rx="0.9" fill="rgba(5,5,5,0.3)"/>

  <!-- ======================== -->
  <!-- CURLED THUMB             -->
  <!-- Tucked to the side       -->
  <!-- ======================== -->
  <!-- Thumb base goes left and curls inward -->
  <path d="M 16 34 Q 10 33 9 28 Q 8 23 13 23 Q 17 23 17 28 L 16 34 Z"
        fill="url(#g2)" opacity="0.88"/>
  <circle cx="13" cy="24.5" r="1.5" fill="rgba(244,241,234,0.12)"/>
  <circle cx="13" cy="24.5" r="0.7" fill="#f4f1ea" opacity="0.7" filter="url(#glow)"/>

  <!-- =============================== -->
  <!-- INDEX FINGER — extended upward  -->
  <!-- =============================== -->
  <!-- Base segment -->
  <rect x="17" y="13" width="7.5" height="16" rx="3" fill="url(#g1)" opacity="0.95"/>
  <rect x="17" y="13" width="7.5" height="2.5" rx="3" fill="rgba(244,241,234,0.18)"/>
  <!-- Mid joint -->
  <rect x="17" y="22" width="7.5" height="2.2" rx="1.1" fill="rgba(5,5,5,0.4)"/>
  <!-- Tip segment -->
  <rect x="17.5" y="4" width="6.5" height="10" rx="3.2" fill="url(#g1)" opacity="0.98"/>
  <rect x="17.5" y="4" width="6.5" height="2.8" rx="3.2" fill="rgba(244,241,234,0.22)"/>
  <!-- Tip joint -->
  <rect x="17" y="13.5" width="7.5" height="2" rx="1" fill="rgba(5,5,5,0.38)"/>
  <!-- Index sensor dot -->
  <circle cx="20.7" cy="5.5" r="1.7" fill="rgba(227,211,183,0.25)"/>
  <circle cx="20.7" cy="5.5" r="0.8" fill="#f4f1ea" opacity="0.98" filter="url(#glow)"/>

  <!-- =============================== -->
  <!-- MIDDLE FINGER — extended upward -->
  <!-- =============================== -->
  <!-- Base segment -->
  <rect x="26" y="10" width="7.5" height="19" rx="3" fill="url(#g1)" opacity="0.95"/>
  <rect x="26" y="10" width="7.5" height="2.5" rx="3" fill="rgba(244,241,234,0.18)"/>
  <!-- Mid joint -->
  <rect x="26" y="21" width="7.5" height="2.2" rx="1.1" fill="rgba(5,5,5,0.4)"/>
  <!-- Tip segment -->
  <rect x="26.5" y="1" width="6.5" height="10" rx="3.2" fill="url(#g1)" opacity="0.98"/>
  <rect x="26.5" y="1" width="6.5" height="2.8" rx="3.2" fill="rgba(244,241,234,0.22)"/>
  <!-- Tip joint -->
  <rect x="26" y="10.5" width="7.5" height="2" rx="1" fill="rgba(5,5,5,0.38)"/>
  <!-- Middle sensor dot -->
  <circle cx="29.7" cy="2.6" r="1.7" fill="rgba(227,211,183,0.25)"/>
  <circle cx="29.7" cy="2.6" r="0.8" fill="#f4f1ea" opacity="0.98" filter="url(#glow)"/>

</svg>
