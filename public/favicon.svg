<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6e27a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>

  <!-- Head (white shell) -->
  <rect x="10" y="10" width="44" height="44" rx="8" fill="white"/>

  <!-- Face panel -->
  <rect x="14" y="14" width="36" height="36" rx="6" fill="#0b0b0b"/>

  <!-- Side bolts -->
  <rect x="6" y="24" width="4" height="12" rx="2" fill="white"/>
  <rect x="54" y="24" width="4" height="12" rx="2" fill="white"/>

  <!-- Eyes -->
  <circle cx="24" cy="28" r="5" fill="url(#gold)"/>
  <circle cx="40" cy="28" r="5" fill="url(#gold)"/>

  <!-- Mouth grill -->
  <rect x="22" y="40" width="20" height="4" rx="2" fill="white"/>

</svg>